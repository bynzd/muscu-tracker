</head>
<body>
<div id="graph-tooltip"><div id="graph-tooltip-content"></div></div>
<nav>
  <button class="active" data-tab="logger" onclick="showTab(this)">Logger</button>
  <button data-tab="generator" onclick="showTab(this)">Générateur</button>
  <button data-tab="progression" onclick="showTab(this)">Progression</button>
  <button data-tab="exos" onclick="showTab(this)">Exercices</button>
</nav>
<main>
  <section id="logger" class="active">
    <h2>Logger une séance</h2>
    <div class="form-group"><label>Date</label><input type="date" id="s-date"></div>
    <div class="row">
      <div class="form-group"><label>Jours de repos avant</label><input type="number" id="s-days" min="0" placeholder="Auto"></div>

    </div>
    <div id="logger-body"></div>
    <button class="btn btn-secondary" onclick="addLoggerExercise()">Ajouter un exercice</button>
    <button class="btn btn-primary" id="save-session-btn" onclick="saveSession()">Enregistrer la séance</button>
    <button class="btn btn-secondary" type="button" id="cancel-edit-btn" style="display:none;" onclick="cancelEdit()">Annuler la modification</button>
    <button class="btn btn-secondary" onclick="saveRestDay()">Marquer repos / GTG</button>
    <h3>Séances récentes</h3>
    <div id="recent-list"></div>
  </section>
  <section id="generator">
    <h2>Générateur de séance suivante</h2>
    <div class="form-group"><label>Jours de repos depuis la dernière séance</label><input type="number" id="g-days" min="0" placeholder="Auto"></div>
    <button class="btn btn-primary" onclick="generatePlan()">Générer ma séance suivante</button>
    <div id="generator-output"></div>
  </section>
  <section id="progression">
    <h2>Progressions</h2>
    <div id="progression-summary"></div>
    <div id="prog-content"></div>
  </section>
  <section id="exos">
    <h2>Bibliothèque d'exercices</h2>
    <div id="library-list"></div>
    <h3>Ajouter un exercice</h3>
    <div class="form-group"><label>Nom</label><input type="text" id="e-name" placeholder="Pompes standard"></div>
    <div class="row">
      <div class="form-group"><label>Groupe</label><select id="e-group"><option value="dos">Dos</option><option value="pectoraux">Pectoraux</option><option value="bras">Bras</option><option value="mixte">Mixte</option></select></div>
      <div class="form-group"><label>Pattern</label><select id="e-pattern"><option value="horizontal">Horizontal</option><option value="vertical">Vertical</option><option value="iso">Iso</option></select></div>
    </div>
    <div class="row">
      <div class="form-group"><label>Type</label><select id="e-type"><option value="reps">Reps</option><option value="charge">Charge</option><option value="iso">Iso</option></select></div>
      <div class="form-group"><label>GTG OK</label><select id="e-gtg"><option value="true">Oui</option><option value="false">Non</option></select></div>
    </div>
    <div class="row">
      <div class="form-group"><label>Min reps / temps</label><input type="number" id="e-min" min="0" placeholder="8"></div>
      <div class="form-group"><label>Max reps / temps</label><input type="number" id="e-max" min="0" placeholder="15"></div>
    </div>
    <div class="row">
      <div class="form-group"><label>Séries cible</label><input type="number" id="e-series" min="1" placeholder="4"></div>
      <div class="form-group"><label>Tempo excentrique (s)</label><input type="number" id="e-tempo" min="0" placeholder="2"></div>
    </div>
    <div class="form-group"><label>Variante plus dure</label><select id="e-variant"><option value="">Aucune</option></select></div>
    <div class="form-group"><label>Objectif / skill</label><select id="e-objectif"><option value="false">Non</option><option value="true">Oui</option></select></div>
    <button class="btn btn-primary" onclick="addExerciseLibrary()">Ajouter l'exercice</button>

</main>

function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function today() { return new Date().toISOString().slice(0, 10); }
function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function save(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
function parseDate(date) { return new Date(date + 'T00:00'); }
function dayDifference(a, b) { return Math.round((parseDate(a) - parseDate(b)) / 86400000); }
function getExercises() {
  let exos = load(STORAGE.exos, null);
  if (!Array.isArray(exos)) { exos = [...DEFAULT_EXOS]; save(STORAGE.exos, exos); return exos; }
  const existing = {};
  exos.forEach(e => existing[e.id] = true);
  DEFAULT_EXOS.forEach(defaultExo => { if (!existing[defaultExo.id]) exos.push(defaultExo); });
  save(STORAGE.exos, exos);
  return exos;
}
function getSessions() {
  let sessions = load(STORAGE.seances, null);
  if (!Array.isArray(sessions)) {
    const old = load('seances', null);
    if (Array.isArray(old)) {
      sessions = migrateOldSessions(old);
      save(STORAGE.seances, sessions);
    } else {
      sessions = [];
    }
  }
  return sessions;
}
function saveSessions(sessions) { save(STORAGE.seances, sessions); }
function migrateOldSessions(old) {
  let exos = getExercises();
  const byName = {};
  exos.forEach(e => { byName[e.nom.toLowerCase()] = e; byName[e.id.toLowerCase()] = e; });
  const sessions = old.map(entry => {
    const id = entry.id || Date.now() + Math.floor(Math.random() * 1000);
    const date = entry.date || today();
    if (entry.type === 'gtg') {
      return { id, date, exercices: [], note: 'GTG repos', joursReposAvant: 0, type: 'repos' };
    }
    if (Array.isArray(entry.exercices)) {
      return { ...entry, id, type: entry.type || 'seance' };
    }
    if (!entry.exo) {
      return { id, date, exercices: [], note: 'Séance importée', joursReposAvant: 0, type: 'repos' };
    }
    const key = entry.exo.toLowerCase();
    let exo = byName[key];
    if (!exo) {
      const slug = entry.exo.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'exo_' + id;
      exo = { id: slug, nom: entry.exo, groupe: 'mixte', pattern: 'horizontal', type: entry.charge > 0 ? 'charge' : 'reps', plageReps: [Math.max(1, (entry.reps || 0) - 2), Math.max(entry.reps || 1, (entry.reps || 1) + 2)], seriesCible: entry.series || 3, gtgOk: false, tempoExcentrique: 2, variantePlusDure: null, objectif: false, prerequis: null };
      exos.push(exo);
      byName[slug] = exo;
      byName[exo.nom.toLowerCase()] = exo;
    }
    const series = [{ reps: entry.reps || 0, charge: entry.charge || 0 }];
    return { id, date, exercices: [{ exoId: exo.id, series, tempo: entry.tempo || 'normal', note: '' }], joursReposAvant: 0 };

  save(STORAGE.exos, exos);
  return sessions;

          target.series = exo.seriesCible;
          target.reps = repMax;
          target.note = 'Maintien au max';
        } else {
          target.series = exo.seriesCible;
          target.reps = repMax;
          target.note = 'Maintien au max';

    } else if (allAtMin) {
      target.series = series.length || 1;
      target.reps = Math.min(best + 1, repMax);

      <div>${progressions.length ? progressions.map(r => `${esc(r.exo.nom)} : ${formatMetricValue(r.exo, r.points[r.points.length - 1]?.metric || 0)}`).join('<br>') : '<span class="empty">Pas assez de données</span>'}</div>
      <strong style="margin-top:10px; display:block;">Stagnations</strong>
      <div>${stagnations.length ? stagnations.map(r => `${esc(r.exo.nom)} : ${formatMetricValue(r.exo, r.points[r.points.length - 1]?.metric || 0)}`).join('<br>') : '<span class="empty">Aucune stagnation détectée</span>'}</div>
    </div>`;
  content.innerHTML = results.map(r => renderExoProgress(r.exo, r.points, r.slope)).join('');
}
function computeMetric(exo, series) {
  if (!series || !series.length) return 0;
  return series.reduce((sum, s) => sum + (s.reps || 0), 0);
}
function formatMetricValue(exo, value) {
  if (exo.type === 'iso') return `${Math.round(value)} s`;
  return `${Math.round(value)} reps`;
}
function computeSlope(points) {
  if (points.length < 2) return 0;
  const n = points.length;
  const meanX = (n - 1) / 2;
  const meanY = points.reduce((sum, p) => sum + p.metric, 0) / n;
  let num = 0, den = 0;
  points.forEach((p, i) => {
    const dx = i - meanX;
    num += dx * (p.metric - meanY);
    den += dx * dx;
  });
  return den ? num / den : 0;
}
function renderExoProgress(exo, points, slope) {
  if (!points.length) return '';
  const lastEntry = points[points.length - 1].entry;
  const seriesTable = lastEntry.series.map((s, i) => `<tr><td>${i+1}</td><td>${s.reps}</td><td>${s.charge ? s.charge + ' kg' : '-'}</td></tr>`).join('');
  const graph = renderGraph(exo, points, slope);
  const note = points.length < 3 ? '<div class="empty">Données insuffisantes pour projection.</div>' : '';
  const editBtn = `<button class="btn btn-secondary" style="margin-top:8px; font-size:12px; padding:6px;" onclick="editExoFromProgression('${esc(exo.id)}', ${points.length - 1})">Éditer dernière séance</button>`;
  return `
    <h3>${esc(exo.nom)}</h3>
    <div class="prog-block" style="padding:12px;">
      <div class="entry-detail">Dernier : ${formatMetricValue(exo, points[points.length - 1].metric)}</div>
      <table style="width:100%; font-size:12px; margin-top:8px; border-collapse:collapse;">
        <tr style="background:#0a0a0a; border-bottom:1px solid #333;">
          <th style="padding:6px; text-align:left;">Série</th>
          <th style="padding:6px; text-align:left;">Reps</th>
          <th style="padding:6px; text-align:left;">Charge</th>
        </tr>
        ${seriesTable}
      </table>
      ${graph}
      ${note}
      ${editBtn}
    </div>`;
}
const _graphData = {};
function renderGraph(exo, points, slope) {
  const width = 520; const height = 220; const padding = 40;
  if (!points.length) return '<div class="empty">Pas de données.</div>';
  _graphData[exo.id] = points;
  const values = points.map(p => p.metric);
  const maxValue = Math.max(...values, 1);
  const yMin = 0;
  const yMax = Math.max(maxValue * 1.2, 1);
  const count = points.length;
  const xStep = (width - padding * 2) / Math.max(count - 1, 1);
  const pointSvg = points.map((p, index) => {
    const x = padding + index * xStep;
    const y = height - padding - ((p.metric - yMin) / (yMax - yMin)) * (height - padding * 2);
    return `<circle cx="${x}" cy="${y}" r="14" fill="transparent" style="cursor:pointer;" onclick="showGraphTooltip('${exo.id}',${index},event)"></circle><circle cx="${x}" cy="${y}" r="5" fill="#4ade80" pointer-events="none"></circle>`;
  }).join('');
  let path = '';
  if (count > 1) {
    path = points.map((p, index) => {
      const x = padding + index * xStep;
      const y = height - padding - ((p.metric - yMin) / (yMax - yMin)) * (height - padding * 2);
      return `${index === 0 ? 'M' : 'L'}${x} ${y}`;
    }).join(' ');
  }
  let projectionSvg = '';
  if (count >= 3) {
    const planEntry = generatedPlan?.exercices.find(e => e.exoId === exo.id) || null;
    const targetMetric = planEntry ? computeMetric(exo, planEntry.seriesRows || []) : null;
    const predicted = [];
    const slopeValue = slope || 0;
    if (planEntry && targetMetric !== null) {
      predicted.push({ x: padding + count * xStep, yVal: targetMetric });
      predicted.push({ x: padding + (count + 1) * xStep, yVal: targetMetric + slopeValue });
      predicted.push({ x: padding + (count + 2) * xStep, yVal: targetMetric + 2 * slopeValue });
    } else {
      for (let i = 1; i <= 3; i += 1) {
        const yVal = points[count - 1].metric + slopeValue * i;
        predicted.push({ x: padding + (count - 1 + i) * xStep, yVal });
      }
    }
    const projPath = predicted.map((p, i) => {
      const y = height - padding - ((p.yVal - yMin) / (yMax - yMin)) * (height - padding * 2);
      return `${i === 0 ? 'M' : 'L'}${p.x} ${y}`;
    }).join(' ');
    projectionSvg = `<path d="${projPath}" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6 6"></path>` + predicted.map(p => {
      const y = height - padding - ((p.yVal - yMin) / (yMax - yMin)) * (height - padding * 2);
      return `<circle cx="${p.x}" cy="${y}" r="3" fill="#60a5fa"></circle>`;
    }).join('');
  }
  const yAxis = Array.from({ length: 5 }, (_, i) => {
    const y = padding + i * ((height - padding * 2) / 4);
    const value = Math.round((yMax - ((y - padding) / (height - padding * 2)) * (yMax - yMin)));
    return `<text x="6" y="${y + 4}" fill="#777" font-size="11">${formatMetricValue(exo, value)}</text><line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#222" stroke-width="1"></line>`;
  }).join('');
  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" style="background:#111; border-radius:12px; margin-top:12px;">
      <rect x="0" y="0" width="${width}" height="${height}" fill="#111"></rect>
      ${yAxis}
      ${path ? `<path d="${path}" fill="none" stroke="#4ade80" stroke-width="2"></path>` : ''}
      ${pointSvg}
      ${projectionSvg}
      <text x="${padding}" y="${height - 12}" fill="#aaa" font-size="11">${esc(points[0].date)}</text>
      <text x="${width - padding - 80}" y="${height - 12}" fill="#aaa" font-size="11">${esc(points[points.length - 1].date)}</text>
      ${points.length >= 3 ? `<text x="${width - padding - 220}" y="${padding + 16}" fill="#60a5fa" font-size="11">Tendance indicative</text>` : ''}
    </svg>`;
}
function showGraphTooltip(exoId, index, event) {
  event.stopPropagation();
  const points = _graphData[exoId];
  if (!points || !points[index]) return;
  const p = points[index];
  const series = p.entry?.series || [];
  const rows = series.map((s, i) => {
    const charge = s.charge ? ` · ${s.charge} kg` : '';
    return `<div class="tt-row"><span>Série ${i + 1}</span><span>${s.reps} reps${charge}</span></div>`;
  }).join('');
  const total = series.reduce((sum, s) => sum + (s.reps || 0), 0);
  document.getElementById('graph-tooltip-content').innerHTML =
    `<div class="tt-date">${p.date}</div>${rows}<div class="tt-total">Total : ${total} reps</div>`;
  const tt = document.getElementById('graph-tooltip');
  tt.style.display = 'block';
  const margin = 12;
  let left = event.clientX + margin;
  let top = event.clientY - tt.offsetHeight / 2;
  if (left + 230 > window.innerWidth) left = event.clientX - 230 - margin;
  if (top < margin) top = margin;
  if (top + tt.offsetHeight + margin > window.innerHeight) top = window.innerHeight - tt.offsetHeight - margin;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}
document.addEventListener('click', () => { document.getElementById('graph-tooltip').style.display = 'none'; });
function renderExercises() {
  const library = document.getElementById('library-list');
  const exos = getExercises();
  library.innerHTML = exos.map(ex => `
    <div class="entry">
      <div class="entry-head"><span class="entry-title">${esc(ex.nom)}</span><span class="badge">${formatGroup(ex.groupe)}</span></div>
      <div class="entry-detail">Type: ${esc(ex.type)} · ${esc(ex.pattern)} · ${ex.plageReps[0]}-${ex.plageReps[1]} reps · Séries ${ex.seriesCible} · Tempo ${ex.tempoExcentrique}s${ex.gtgOk ? ' · GTG OK' : ''}${ex.objectif ? ' · Objectif' : ''}</div>
    </div>`).join('');
  const variantSelect = document.getElementById('e-variant');
  variantSelect.innerHTML = '<option value="">Aucune</option>' + exos.map(ex => `<option value="${esc(ex.id)}">${esc(ex.nom)}</option>`).join('');
}
function addExerciseLibrary() {
  const nom = document.getElementById('e-name').value.trim();
  if (!nom) { alert('Nom requis.'); return; }
  const exos = getExercises();
  const id = normalizeName(nom) || 'exo_' + Date.now();
  if (exos.some(e => e.id === id)) { alert('Un exercice existe déjà avec ce nom.'); return; }
  const exo = {
    id,
    nom,
    groupe: document.getElementById('e-group').value,
    pattern: document.getElementById('e-pattern').value,
    type: document.getElementById('e-type').value,
    plageReps: [parseInt(document.getElementById('e-min').value) || 0, parseInt(document.getElementById('e-max').value) || 0],
    seriesCible: parseInt(document.getElementById('e-series').value) || 1,
    gtgOk: document.getElementById('e-gtg').value === 'true',
    tempoExcentrique: parseInt(document.getElementById('e-tempo').value) || 2,
    variantePlusDure: document.getElementById('e-variant').value || null,
    objectif: document.getElementById('e-objectif').value === 'true',
    prerequis: null
  };
  exos.push(exo);
  save(STORAGE.exos, exos);
  renderExercises();
  document.getElementById('e-name').value = '';
  alert('Exercice ajouté.');
}
window.onload = init;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
