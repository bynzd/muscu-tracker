<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker Muscu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; }

    nav { display: flex; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; position: sticky; top: 0; z-index: 10; }
    nav button { flex: 1; padding: 14px 8px; background: none; border: none; border-bottom: 2px solid transparent; color: #666; font-size: 14px; cursor: pointer; }
    nav button.active { color: #fff; border-bottom-color: #4ade80; }

    main { padding: 16px; max-width: 560px; margin: 0 auto; }
    section { display: none; }
    section.active { display: block; }

    h2 { font-size: 17px; font-weight: 700; color: #4ade80; margin-bottom: 16px; }
    h3 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin: 24px 0 10px; }

    .form-group { margin-bottom: 11px; }
    label { display: block; font-size: 12px; color: #777; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px 12px; background: #1e1e1e; border: 1px solid #333; border-radius: 7px; color: #eee; font-size: 15px; }
    input:focus, select:focus { outline: none; border-color: #4ade80; }
    input::placeholder { color: #444; }

    .row { display: flex; gap: 10px; }
    .row .form-group { flex: 1; }

    .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; }
    .btn-primary { background: #4ade80; color: #111; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn:active { opacity: .85; }

    .entry { background: #1a1a1a; border-radius: 8px; padding: 11px 13px; margin-bottom: 8px; border-left: 3px solid #4ade80; }
    .entry.gtg { border-left-color: #60a5fa; }
    .entry-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .entry-title { font-size: 14px; font-weight: 600; }
    .entry-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .entry-date { font-size: 12px; color: #555; }
    .entry-detail { font-size: 13px; color: #888; margin-top: 4px; }
    .del { background: none; border: none; color: #444; cursor: pointer; font-size: 19px; line-height: 1; padding: 0 2px; }
    .del:hover { color: #f87171; }

    .prog-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .prog-table th { text-align: left; color: #666; font-weight: 500; padding: 4px 8px 6px; border-bottom: 1px solid #2a2a2a; }
    .prog-table td { padding: 7px 8px; border-bottom: 1px solid #1e1e1e; }
    .prog-table tr:last-child td { border-bottom: none; }
    .prog-block { background: #1a1a1a; border-radius: 8px; overflow: hidden; margin-bottom: 4px; }

    .cal-hero { margin-bottom: 10px; }
    .cal-total { font-size: 32px; font-weight: 700; line-height: 1; }
    .cal-sub { font-size: 13px; color: #666; margin-top: 3px; }
    .cal-bar-wrap { background: #222; border-radius: 6px; height: 10px; margin: 10px 0 4px; overflow: hidden; }
    .cal-bar { height: 100%; background: #4ade80; border-radius: 6px; transition: width .3s; max-width: 100%; }
    .cal-bar.over { background: #f87171; }
    .cal-markers { display: flex; justify-content: space-between; font-size: 11px; color: #555; }
    .cal-entry { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; border-radius: 7px; padding: 10px 12px; margin-bottom: 6px; }
    .cal-name { font-size: 14px; }
    .cal-right { display: flex; align-items: center; gap: 10px; }
    .cal-kcal { font-size: 14px; font-weight: 600; color: #4ade80; }

    .empty { color: #444; font-size: 14px; padding: 12px 0; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; background: #1e3a2a; color: #4ade80; margin-left: 6px; vertical-align: middle; }
  </style>
</head>
<body>

<nav>
  <button class="active" data-tab="logger" onclick="showTab(this)">Logger</button>
  <button data-tab="progression" onclick="showTab(this)">Progression</button>
  <button data-tab="nutrition" onclick="showTab(this)">Nutrition</button>
</nav>

<main>

  <!-- LOGGER -->
  <section id="logger" class="active">
    <h2>Logger une séance</h2>

    <div class="form-group">
      <label>Date</label>
      <input type="date" id="s-date">
    </div>
    <div class="form-group">
      <label>Exercice</label>
      <select id="s-exo">
        <option>Tractions</option>
        <option>Pompes surélevées</option>
        <option>Pompes diamant</option>
        <option>Dips</option>
      </select>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Séries</label>
        <input type="number" id="s-series" min="1" placeholder="3">
      </div>
      <div class="form-group">
        <label>Reps</label>
        <input type="number" id="s-reps" min="1" placeholder="8">
      </div>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Charge (kg)</label>
        <input type="number" id="s-charge" min="0" step="0.5" placeholder="0">
      </div>
      <div class="form-group">
        <label>Tempo</label>
        <select id="s-tempo">
          <option value="normal">Normal</option>
          <option value="lent">Lent (5s descente)</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="logSeance()">Enregistrer</button>
    <button class="btn btn-secondary" onclick="logGTG()">Marquer GTG (jour de repos)</button>

    <h3>Séances récentes</h3>
    <div id="recent-list"></div>
  </section>

  <!-- PROGRESSION -->
  <section id="progression">
    <h2>Progression</h2>
    <div id="prog-content"></div>
  </section>

  <!-- NUTRITION -->
  <section id="nutrition">
    <h2>Calories du jour</h2>
    <div id="cal-summary"></div>

    <h3>Ajouter</h3>
    <div class="row">
      <div class="form-group" style="flex:2">
        <label>Aliment / repas</label>
        <input type="text" id="n-food" placeholder="Whey, poulet, riz…">
      </div>
      <div class="form-group" style="flex:1">
        <label>kcal</label>
        <input type="number" id="n-kcal" min="1" placeholder="300">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addCal()">Ajouter</button>

    <h3>Entrées du jour</h3>
    <div id="cal-list"></div>
  </section>

</main>

<script>
const CAL_MIN = 3200, CAL_MAX = 3500;

// --- utils ---
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function today() { return new Date().toISOString().slice(0, 10); }
function load(k, d) { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } }
function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

// --- tabs ---
function showTab(btn) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  const id = btn.dataset.tab;
  document.getElementById(id).classList.add('active');
  if (id === 'progression') renderProg();
  if (id === 'nutrition') renderNutrition();
  if (id === 'logger') renderRecent();
}

// --- séances ---
function logSeance() {
  const date = document.getElementById('s-date').value || today();
  const exo = document.getElementById('s-exo').value;
  const series = parseInt(document.getElementById('s-series').value);
  const reps = parseInt(document.getElementById('s-reps').value);
  const charge = parseFloat(document.getElementById('s-charge').value) || 0;
  const tempo = document.getElementById('s-tempo').value;

  if (!series || !reps) { alert('Renseigne séries et reps.'); return; }

  const seances = load('seances', []);
  seances.push({ id: Date.now(), type: 'seance', date, exo, series, reps, charge, tempo });
  save('seances', seances);

  document.getElementById('s-series').value = '';
  document.getElementById('s-reps').value = '';
  document.getElementById('s-charge').value = '';
  document.getElementById('s-tempo').value = 'normal';
  renderRecent();
}

function logGTG() {
  const date = document.getElementById('s-date').value || today();
  const seances = load('seances', []);
  seances.push({ id: Date.now(), type: 'gtg', date });
  save('seances', seances);
  renderRecent();
}

function deleteEntry(id) {
  save('seances', load('seances', []).filter(s => s.id !== id));
  renderRecent();
  if (document.getElementById('progression').classList.contains('active')) renderProg();
}

function renderRecent() {
  const el = document.getElementById('recent-list');
  const recent = [...load('seances', [])].reverse().slice(0, 20);
  if (!recent.length) { el.innerHTML = '<p class="empty">Aucune séance encore.</p>'; return; }
  el.innerHTML = recent.map(s => {
    if (s.type === 'gtg') return `
      <div class="entry gtg">
        <div class="entry-head">
          <span class="entry-title">GTG <span class="badge">repos</span></span>
          <span class="entry-meta">
            <span class="entry-date">${esc(s.date)}</span>
            <button class="del" onclick="deleteEntry(${s.id})">×</button>
          </span>
        </div>
      </div>`;
    const chargeStr = s.charge ? ` · ${s.charge} kg` : '';
    const tempoStr = s.tempo === 'lent' ? ' · Tempo lent' : '';
    return `
      <div class="entry">
        <div class="entry-head">
          <span class="entry-title">${esc(s.exo)}</span>
          <span class="entry-meta">
            <span class="entry-date">${esc(s.date)}</span>
            <button class="del" onclick="deleteEntry(${s.id})">×</button>
          </span>
        </div>
        <div class="entry-detail">${s.series}×${s.reps}${chargeStr}${tempoStr}</div>
      </div>`;
  }).join('');
}

// --- progression ---
const EXOS = ['Tractions', 'Pompes surélevées', 'Pompes diamant', 'Dips'];

function renderProg() {
  const seances = load('seances', []).filter(s => s.type === 'seance');
  const el = document.getElementById('prog-content');
  if (!seances.length) { el.innerHTML = '<p class="empty">Aucune séance enregistrée.</p>'; return; }

  el.innerHTML = EXOS.map(exo => {
    const entries = seances
      .filter(s => s.exo === exo)
      .sort((a, b) => a.date.localeCompare(b.date));
    if (!entries.length) return `<h3>${esc(exo)}</h3><p class="empty">Pas de données.</p>`;
    const rows = entries.map(s => {
      const charge = s.charge ? s.charge + ' kg' : '—';
      const tempo = s.tempo === 'lent' ? 'Lent' : 'Normal';
      return `<tr>
        <td>${esc(s.date)}</td>
        <td><strong>${s.series}×${s.reps}</strong></td>
        <td>${charge}</td>
        <td>${tempo}</td>
      </tr>`;
    }).join('');
    return `
      <h3>${esc(exo)}</h3>
      <div class="prog-block">
        <table class="prog-table">
          <tr><th>Date</th><th>Séries×Reps</th><th>Charge</th><th>Tempo</th></tr>
          ${rows}
        </table>
      </div>`;
  }).join('');
}

// --- nutrition ---
function addCal() {
  const food = document.getElementById('n-food').value.trim();
  const kcal = parseInt(document.getElementById('n-kcal').value);
  if (!food || !kcal || kcal < 1) { alert('Renseigne aliment et calories.'); return; }

  const key = 'cal_' + today();
  const entries = load(key, []);
  entries.push({ id: Date.now(), food, kcal });
  save(key, entries);

  document.getElementById('n-food').value = '';
  document.getElementById('n-kcal').value = '';
  renderNutrition();
}

function deleteCal(id) {
  const key = 'cal_' + today();
  save(key, load(key, []).filter(e => e.id !== id));
  renderNutrition();
}

function renderNutrition() {
  const key = 'cal_' + today();
  const entries = load(key, []);
  const total = entries.reduce((s, e) => s + e.kcal, 0);
  const pct = CAL_MAX > 0 ? Math.min((total / CAL_MAX) * 100, 100) : 0;
  const over = total > CAL_MAX;
  const ok = total >= CAL_MIN && total <= CAL_MAX;
  const status = ok ? ' ✓' : over ? ' — dépassé' : '';

  document.getElementById('cal-summary').innerHTML = `
    <div class="cal-hero">
      <div class="cal-total">${total} kcal</div>
      <div class="cal-sub">Cible : ${CAL_MIN}–${CAL_MAX} kcal${status}</div>
    </div>
    <div class="cal-bar-wrap">
      <div class="cal-bar${over ? ' over' : ''}" style="width:${pct}%"></div>
    </div>
    <div class="cal-markers"><span>${CAL_MIN}</span><span>${CAL_MAX}</span></div>`;

  const el = document.getElementById('cal-list');
  if (!entries.length) { el.innerHTML = '<p class="empty">Aucune entrée aujourd\'hui.</p>'; return; }
  el.innerHTML = entries.map(e => `
    <div class="cal-entry">
      <span class="cal-name">${esc(e.food)}</span>
      <span class="cal-right">
        <span class="cal-kcal">${e.kcal} kcal</span>
        <button class="del" onclick="deleteCal(${e.id})">×</button>
      </span>
    </div>`).join('');
}

// --- init ---
document.getElementById('s-date').value = today();
renderRecent();
</script>
</body>
</html>
